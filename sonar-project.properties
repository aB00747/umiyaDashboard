sonar.projectKey=aB00747_umiyaDashboard
sonar.organization=ab00747
sonar.host.url=https://sonarcloud.io

sonar.sources=backend,frontend/src
sonar.python.version=3.13
sonar.exclusions=**/node_modules/**,**/migrations/**,**/__pycache__/**,**/dist/**,**/tests.py

# Coverage reports
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Test file exclusions from coverage
sonar.coverage.exclusions=**/tests.py,**/test_*.py,**/*.test.js,**/*.test.jsx,**/migrations/**
